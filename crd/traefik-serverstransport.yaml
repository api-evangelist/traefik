apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serverstransports.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    kind: ServersTransport
    listKind: ServersTransportList
    singular: serverstransport
    plural: serverstransports
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            ServersTransport configures the HTTP transport Traefik uses to
            communicate with backend services - including TLS client
            authentication, custom root CAs, certificate verification
            skipping, maximum idle connections, forwarding timeouts,
            keepalive, and HTTP/2 settings.
          properties:
            spec:
              type: object
              properties:
                serverName:
                  type: string
                insecureSkipVerify:
                  type: boolean
                rootCAsSecrets:
                  type: array
                  items:
                    type: string
                certificatesSecrets:
                  type: array
                  items:
                    type: string
                maxIdleConnsPerHost:
                  type: integer
                forwardingTimeouts:
                  type: object
                  properties:
                    dialTimeout:
                      type: string
                    responseHeaderTimeout:
                      type: string
                    idleConnTimeout:
                      type: string
                    readIdleTimeout:
                      type: string
                    pingTimeout:
                      type: string
                disableHTTP2:
                  type: boolean
                peerCertURI:
                  type: string
