apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: managedsubscriptions.hub.traefik.io
spec:
  group: hub.traefik.io
  scope: Namespaced
  names:
    kind: ManagedSubscription
    listKind: ManagedSubscriptionList
    singular: managedsubscription
    plural: managedsubscriptions
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            ManagedSubscription grants a developer-portal application
            (consumer identity) the right to call a set of APIs or APIBundles
            under a specific APIPlan. It is the runtime authorization unit -
            credentials issued under this subscription are checked against the
            attached APIPlan's rate-limits and quotas on every request.
          properties:
            spec:
              type: object
              properties:
                plan:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                applications:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                apis:
                  type: array
                  items:
                    type: object
                apiBundles:
                  type: array
                  items:
                    type: object
                groups:
                  type: array
                  items:
                    type: string
                weight:
                  type: integer
                operationFilter:
                  type: object
