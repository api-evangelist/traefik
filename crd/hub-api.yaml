apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apis.hub.traefik.io
spec:
  group: hub.traefik.io
  scope: Namespaced
  names:
    kind: API
    listKind: APIList
    singular: api
    plural: apis
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            API is the central Traefik Hub API Management resource that
            declares an API surface exposed through the Hub data plane. It
            references the underlying Kubernetes Service, a path prefix, and
            optionally an OpenAPI specification used to power the developer
            portal and request linting. Each API can be grouped into APIBundles,
            attached to APIPlans for rate-limits/quotas, and gated via
            ManagedSubscriptions.
          properties:
            spec:
              type: object
              properties:
                pathPrefix:
                  type: string
                service:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    port:
                      oneOf:
                        - type: integer
                        - type: string
                openApiSpec:
                  type: object
                  properties:
                    url:
                      type: string
                    path:
                      type: string
                    operationSets:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          matchers:
                            type: array
                            items:
                              type: object
                versions:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      service:
                        type: object
                cors:
                  type: object
