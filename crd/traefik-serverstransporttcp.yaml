apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serverstransporttcps.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    kind: ServersTransportTCP
    listKind: ServersTransportTCPList
    singular: serverstransporttcp
    plural: serverstransporttcps
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            ServersTransportTCP configures the TCP transport used by Traefik
            when proxying to TCP backends, including TLS client
            authentication, custom root CAs, dial timeouts, and termination
            delay.
          properties:
            spec:
              type: object
              properties:
                dialTimeout:
                  type: string
                dialKeepAlive:
                  type: string
                terminationDelay:
                  type: string
                tls:
                  type: object
                  properties:
                    serverName:
                      type: string
                    insecureSkipVerify:
                      type: boolean
                    rootCAsSecrets:
                      type: array
                      items:
                        type: string
                    certificatesSecrets:
                      type: array
                      items:
                        type: string
                    peerCertURI:
                      type: string
