apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressroutes.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    kind: IngressRoute
    listKind: IngressRouteList
    singular: ingressroute
    plural: ingressroutes
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            IngressRoute is a Traefik HTTP routing resource that matches
            incoming HTTP requests using rule expressions (Host, Path, Headers,
            etc.) and dispatches them to one or more services. It binds to
            specified entryPoints and may apply an ordered chain of middlewares
            and an optional TLS configuration. IngressRoute is the canonical
            replacement for stock Kubernetes Ingress when running Traefik as
            an ingress controller.
          properties:
            spec:
              type: object
              properties:
                entryPoints:
                  type: array
                  items:
                    type: string
                routes:
                  type: array
                  items:
                    type: object
                    properties:
                      match:
                        type: string
                        description: Traefik v3 rule syntax (Host(`x`) && PathPrefix(`/y`)).
                      kind:
                        type: string
                        enum: [Rule]
                      priority:
                        type: integer
                      services:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            kind:
                              type: string
                              enum: [Service, TraefikService]
                            namespace:
                              type: string
                            port:
                              oneOf:
                                - type: integer
                                - type: string
                            scheme:
                              type: string
                            weight:
                              type: integer
                            passHostHeader:
                              type: boolean
                            serversTransport:
                              type: string
                      middlewares:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                tls:
                  type: object
                  properties:
                    secretName:
                      type: string
                    options:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                    certResolver:
                      type: string
                    domains:
                      type: array
                      items:
                        type: object
                        properties:
                          main:
                            type: string
                          sans:
                            type: array
                            items:
                              type: string
