apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressroutetcps.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    kind: IngressRouteTCP
    listKind: IngressRouteTCPList
    singular: ingressroutetcp
    plural: ingressroutetcps
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            IngressRouteTCP is a Traefik TCP routing resource that matches
            incoming TCP connections using a HostSNI rule and dispatches the
            stream to one or more TCP services. It supports TLS termination,
            TLS passthrough, and the application of TCP middlewares such as
            IPAllowList and InFlightConn.
          properties:
            spec:
              type: object
              properties:
                entryPoints:
                  type: array
                  items:
                    type: string
                routes:
                  type: array
                  items:
                    type: object
                    properties:
                      match:
                        type: string
                        description: HostSNI(`example.com`) or ClientIP rule expression.
                      priority:
                        type: integer
                      services:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                            port:
                              oneOf:
                                - type: integer
                                - type: string
                            weight:
                              type: integer
                            proxyProtocol:
                              type: object
                              properties:
                                version:
                                  type: integer
                                  enum: [1, 2]
                            terminationDelay:
                              type: integer
                      middlewares:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                tls:
                  type: object
                  properties:
                    secretName:
                      type: string
                    passthrough:
                      type: boolean
                    options:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                    certResolver:
                      type: string
