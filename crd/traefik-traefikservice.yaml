apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: traefikservices.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    kind: TraefikService
    listKind: TraefikServiceList
    singular: traefikservice
    plural: traefikservices
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            TraefikService is a higher-order routing target that composes
            multiple Kubernetes services using weighted round robin or
            traffic mirroring strategies. It enables canary deployments,
            A/B testing, and shadow traffic to a passive service without
            client-side logic.
          properties:
            spec:
              type: object
              properties:
                weighted:
                  type: object
                  description: Weighted round robin across a list of services.
                  properties:
                    services:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                          port:
                            oneOf:
                              - type: integer
                              - type: string
                          kind:
                            type: string
                          weight:
                            type: integer
                    sticky:
                      type: object
                      properties:
                        cookie:
                          type: object
                          properties:
                            name:
                              type: string
                            secure:
                              type: boolean
                            httpOnly:
                              type: boolean
                            sameSite:
                              type: string
                mirroring:
                  type: object
                  description: Send a fraction of live traffic to a mirror service.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    port:
                      oneOf:
                        - type: integer
                        - type: string
                    mirrors:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                          port:
                            oneOf:
                              - type: integer
                              - type: string
                          percent:
                            type: integer
