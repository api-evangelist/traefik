apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apibundles.hub.traefik.io
spec:
  group: hub.traefik.io
  scope: Namespaced
  names:
    kind: APIBundle
    listKind: APIBundleList
    singular: apibundle
    plural: apibundles
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            APIBundle groups multiple APIs into a single subscribable
            offering. Consumers subscribe to bundles - not individual APIs -
            which simplifies plan attachment, developer-portal presentation,
            and revocation. Bundles carry a human-readable title that
            surfaces in the API portal listing.
          properties:
            spec:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                apis:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
