apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apiportals.hub.traefik.io
spec:
  group: hub.traefik.io
  scope: Namespaced
  names:
    kind: APIPortal
    listKind: APIPortalList
    singular: apiportal
    plural: apiportals
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            APIPortal provisions a Traefik Hub developer portal serving the
            documentation of every API visible to a consumer. The portal
            renders OpenAPI specifications, supports try-it-now requests via
            an interactive console, and integrates with the identity provider
            for subscription self-service.
          properties:
            spec:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                trustedUrls:
                  type: array
                  items:
                    type: string
                ui:
                  type: object
                  properties:
                    logoUrl:
                      type: string
                    customCss:
                      type: string
