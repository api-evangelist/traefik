specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Traefik
providerId: traefik
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - Kubernetes
  - Reverse Proxy
  - Open Source
  - API Management
description: 'Traefik Labs offers three product tiers: an open-source Application Proxy (Traefik Proxy)
  available free under the MIT license, a commercial API Gateway, and a commercial API Management product.
  Pricing for the two commercial tiers is gated behind a "Get Pricing" / sales-contact flow on the public
  pricing page; specific dollar amounts are not published. A free trial is available for Traefik Hub.'
sources:
  - https://traefik.io/pricing/
  - https://traefik.io/traefik-hub/
plans:
  - id: traefik-application-proxy
    name: Application Proxy (Open Source)
    type: freemium
    description: 'Open-source Traefik Proxy: ingress controller, reverse proxy, and load balancer with
      services auto-discovery and support for HTTP/2/3, TCP, UDP, gRPC, and WebSockets. No license fee;
      community support only.'
    entries:
      - label: License
        name: license
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Ingress Controller
      - name: Reverse Proxy
      - name: Load Balancer
      - name: Services Auto-Discovery
      - name: HTTP/2 / HTTP/3 Support
      - name: TCP / UDP / gRPC / WebSockets Support
      - name: Community Support
  - id: traefik-api-gateway
    name: API Gateway
    type: enterprise
    description: 'Commercial API Gateway tier (Traefik Hub). Adds native WAF, advanced security controls
      (LDAP, JWT, OAuth, OIDC), and HashiCorp Vault integration on top of the Application Proxy. Pricing
      is gated: customers must contact sales via the "Get Pricing" CTA. A free trial is available.'
    entries:
      - label: License / Subscription
        name: subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Free Trial
        name: free_trial
        type: quota
        metric: month
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Native WAF
      - name: LDAP / JWT / OAuth / OIDC
      - name: HashiCorp Vault Integration
      - name: Application Proxy Features Included
  - id: traefik-api-management
    name: API Management
    type: enterprise
    description: Top commercial tier covering API mocking, request validation, centralized control plane,
      and developer portal in addition to all API Gateway features. Pricing is gated; customers must contact
      sales for a quote.
    entries:
      - label: License / Subscription
        name: subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: API Mocking
      - name: Request Validation
      - name: Centralized Control Plane
      - name: Developer Portal
      - name: All API Gateway Features Included
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
