alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Traefik
providerId: traefik
publisherName: Traefik Labs
serviceCategory: API Gateway / API Management Software
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - Kubernetes
  - Reverse Proxy
  - Open Source
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Traefik Labs: an open-source Application Proxy with $0 license
  cost, plus two commercial tiers (API Gateway, API Management) where pricing is contracted via sales
  rather than published. Costs at customers consist of (a) infrastructure to run Traefik Proxy and (b)
  any commercial Traefik Hub subscription, neither of which Traefik bills metered per-request.'
sources:
  - https://traefik.io/pricing/
  - https://traefik.io/traefik-hub/
billingModel:
  pricingCategory: Open Source + Contracted Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Traefik
  ServiceCategory: API Gateway Software
  ProviderName: Traefik
  PublisherName: Traefik Labs
  InvoiceIssuerName: Traefik Labs
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
  PricingUnit: contract
meters:
  - name: traefik_hub_subscription
    description: Annualized Traefik Hub commercial subscription (API Gateway or API Management tier).
      Quantity and price are contract-defined.
    unit: contract
    aggregation: sum
    dimensions:
      - tier
      - environment
  - name: self_hosted_infra_cost
    description: Infrastructure cost (compute, network, storage) of running Traefik Proxy on the customer's
      own platform. Not billed by Traefik Labs; tracked here for total-cost-of-ownership.
    unit: varies
    aggregation: sum
    dimensions:
      - cloud
      - region
      - environment
principles:
  - name: Visibility
    description: Pull subscription invoices from Traefik Labs for the Hub tier; pull infrastructure cost
      from your cloud provider's FOCUS export to see total cost of running Traefik.
  - name: Allocation
    description: Tag the Kubernetes namespace, cluster, or VM running Traefik Proxy with the consuming
      product/team so the proxy's compute/egress is allocated alongside the apps it fronts.
  - name: Optimization
    description: Use the open-source Application Proxy where the commercial features (WAF, OIDC, mocking)
      are not required; right-size pod replicas and node pools so the proxy scales to actual ingress volume.
  - name: Accountability
    description: Designate a platform-team owner for the Traefik deployment and the Hub contract; review
      Hub seats/environments at each renewal.
maintainers:
