naftiko: 1.0.0-alpha2
info:
  label: Traefik Proxy REST API — Health
  description: 'Traefik Proxy REST API — Health. 1 operations. Lead operation: Health Check Ping. Self-contained Naftiko capability
    covering one Traefik business surface.'
  tags:
  - Traefik
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRAEFIK_API_KEY: TRAEFIK_API_KEY
capability:
  consumes:
  - type: http
    namespace: proxy-health
    baseUri: http://localhost:8080/api
    description: Traefik Proxy REST API — Health business capability. Self-contained, no shared references.
    resources:
    - name: ping
      path: /ping
      operations:
      - name: ping
        method: GET
        description: Health Check Ping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: proxy-health-rest
    port: 8080
    description: REST adapter for Traefik Proxy REST API — Health. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ping
      name: ping
      description: REST surface for ping.
      operations:
      - method: GET
        name: ping
        description: Health Check Ping
        call: proxy-health.ping
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: proxy-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for Traefik Proxy REST API — Health. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: health-check-ping
      description: Health Check Ping
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-health.ping
      outputParameters:
      - type: object
        mapping: $.
