naftiko: "1.0.0-alpha2"

info:
  title: Traefik Middleware as Policy
  description: >-
    Authors Traefik Middleware CRDs (RateLimit, Headers, BasicAuth,
    ForwardAuth, IPAllowList, CircuitBreaker, Retry, ReplacePath, etc.)
    via Naftiko's declarative spec layer. The Naftiko capability YAML
    declares the middleware intent; this capability creates / patches /
    deletes the corresponding traefik.io/v1alpha1 Middleware in the
    Kubernetes cluster via the Kubernetes API.
  tags:
    - Naftiko
    - Traefik
    - Partnership
    - Middleware
    - Policy
    - Kubernetes
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: k8s-env
    description: Kubernetes API server + bearer token (typically the Naftiko engine's service account).
    keys:
      K8S_API_BASE: K8S_API_BASE
      K8S_TOKEN: K8S_TOKEN

capability:
  consumes:
    - namespace: k8s
      type: http
      baseUri: '{{K8S_API_BASE}}'
      authentication:
        type: bearer
        token: '{{K8S_TOKEN}}'
      resources:
        - name: list-middlewares
          path: '/apis/traefik.io/v1alpha1/namespaces/{{namespace}}/middlewares'
          operations:
            - name: list-middlewares
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-middleware
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true
        - name: middleware
          path: '/apis/traefik.io/v1alpha1/namespaces/{{namespace}}/middlewares/{{name}}'
          operations:
            - name: get-middleware
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
            - name: replace-middleware
              method: PUT
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
            - name: delete-middleware
              method: DELETE
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: traefik-middleware-as-policy-rest
      description: REST surface for managing Traefik Middleware CRDs as policy.
      resources:
        - name: middlewares
          path: '/middlewares/{namespace}'
          operations:
            - name: list-middlewares
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-middlewares
            - name: create-middleware
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-middleware
        - name: middleware
          path: '/middlewares/{namespace}/{name}'
          operations:
            - name: get-middleware
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.get-middleware
            - name: replace-middleware
              method: PUT
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.replace-middleware
            - name: delete-middleware
              method: DELETE
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.delete-middleware

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: traefik-middleware-as-policy-mcp
      description: MCP server for authoring Traefik middleware policies from Naftiko spec.
      tools:
        - name: list-middlewares
          description: List Traefik Middleware CRDs in a namespace.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true, description: Kubernetes namespace. }
          call: k8s.list-middlewares
        - name: create-middleware
          description: Create a new Traefik Middleware CRD in a namespace.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true, description: Kubernetes namespace. }
          call: k8s.create-middleware
        - name: get-middleware
          description: Get a single Traefik Middleware CRD.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.get-middleware
        - name: replace-middleware
          description: Replace a Traefik Middleware CRD.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.replace-middleware
        - name: delete-middleware
          description: Delete a Traefik Middleware CRD.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.delete-middleware
