naftiko: 1.0.0-alpha2
info:
  label: Traefik Proxy REST API — Overview
  description: 'Traefik Proxy REST API — Overview. 4 operations. Lead operation: Get Overview Statistics. Self-contained Naftiko
    capability covering one Traefik business surface.'
  tags:
  - Traefik
  - Overview
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRAEFIK_API_KEY: TRAEFIK_API_KEY
capability:
  consumes:
  - type: http
    namespace: proxy-overview
    baseUri: http://localhost:8080/api
    description: Traefik Proxy REST API — Overview business capability. Self-contained, no shared references.
    resources:
    - name: overview
      path: /overview
      operations:
      - name: getoverview
        method: GET
        description: Get Overview Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rawdata
      path: /rawdata
      operations:
      - name: getrawdata
        method: GET
        description: Get Raw Configuration Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: support-dump
      path: /support-dump
      operations:
      - name: getsupportdump
        method: GET
        description: Get Anonymized Support Dump
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: version
      path: /version
      operations:
      - name: getversion
        method: GET
        description: Get Traefik Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: proxy-overview-rest
    port: 8080
    description: REST adapter for Traefik Proxy REST API — Overview. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/overview
      name: overview
      description: REST surface for overview.
      operations:
      - method: GET
        name: getoverview
        description: Get Overview Statistics
        call: proxy-overview.getoverview
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rawdata
      name: rawdata
      description: REST surface for rawdata.
      operations:
      - method: GET
        name: getrawdata
        description: Get Raw Configuration Data
        call: proxy-overview.getrawdata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/support-dump
      name: support-dump
      description: REST surface for support-dump.
      operations:
      - method: GET
        name: getsupportdump
        description: Get Anonymized Support Dump
        call: proxy-overview.getsupportdump
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/version
      name: version
      description: REST surface for version.
      operations:
      - method: GET
        name: getversion
        description: Get Traefik Version
        call: proxy-overview.getversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: proxy-overview-mcp
    port: 9090
    transport: http
    description: MCP adapter for Traefik Proxy REST API — Overview. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-overview-statistics
      description: Get Overview Statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-overview.getoverview
      outputParameters:
      - type: object
        mapping: $.
    - name: get-raw-configuration-data
      description: Get Raw Configuration Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-overview.getrawdata
      outputParameters:
      - type: object
        mapping: $.
    - name: get-anonymized-support-dump
      description: Get Anonymized Support Dump
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-overview.getsupportdump
      outputParameters:
      - type: object
        mapping: $.
    - name: get-traefik-version
      description: Get Traefik Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: proxy-overview.getversion
      outputParameters:
      - type: object
        mapping: $.
