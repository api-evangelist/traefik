naftiko: "1.0.0-alpha2"

info:
  title: Traefik Developer Portal Sync
  description: >-
    Pushes Naftiko-built REST OpenAPI specs into Traefik Hub's APIPortal
    + APICatalogItem CRDs so they appear in Traefik's branded developer
    portal with try-it consoles, plan badges, and managed-subscription
    flows. Naftiko ships the API; Traefik portal handles the developer
    onboarding UX.
  tags:
    - Naftiko
    - Traefik
    - Partnership
    - Developer-Portal
    - OpenAPI
    - Hub
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: k8s-env
    description: Kubernetes API server + bearer token (Naftiko engine's service account).
    keys:
      K8S_API_BASE: K8S_API_BASE
      K8S_TOKEN: K8S_TOKEN

capability:
  consumes:
    - namespace: k8s
      type: http
      baseUri: '{{K8S_API_BASE}}'
      authentication:
        type: bearer
        token: '{{K8S_TOKEN}}'
      resources:
        - name: api-portals
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apiportals'
          operations:
            - name: list-api-portals
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-api-portal
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true
        - name: api-portal
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apiportals/{{name}}'
          operations:
            - name: get-api-portal
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
            - name: replace-api-portal
              method: PUT
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
        - name: catalog-items
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apicatalogitems'
          operations:
            - name: list-catalog-items
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-catalog-item
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: traefik-developer-portal-sync-rest
      description: REST surface for managing the Traefik Hub developer portal.
      resources:
        - name: api-portals
          path: '/api-portals/{namespace}'
          operations:
            - name: list-api-portals
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-api-portals
            - name: create-api-portal
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-api-portal
        - name: api-portal
          path: '/api-portals/{namespace}/{name}'
          operations:
            - name: get-api-portal
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.get-api-portal
            - name: replace-api-portal
              method: PUT
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.replace-api-portal
        - name: catalog-items
          path: '/catalog-items/{namespace}'
          operations:
            - name: list-catalog-items
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-catalog-items
            - name: create-catalog-item
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-catalog-item

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: traefik-developer-portal-sync-mcp
      description: MCP server for managing Traefik Hub developer portal entries.
      tools:
        - name: list-api-portals
          description: List Traefik Hub APIPortal CRDs in a namespace.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-api-portals
        - name: create-api-portal
          description: Create a new Traefik Hub APIPortal CRD.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.create-api-portal
        - name: get-api-portal
          description: Get a single Traefik Hub APIPortal CRD.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.get-api-portal
        - name: replace-api-portal
          description: Replace a Traefik Hub APIPortal CRD.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.replace-api-portal
        - name: list-catalog-items
          description: List Traefik Hub APICatalogItem CRDs (portal visibility scoping).
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-catalog-items
        - name: create-catalog-item
          description: Create a new Traefik Hub APICatalogItem CRD.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.create-catalog-item
