naftiko: "1.0.0-alpha2"

info:
  title: Traefik Metrics Bridge
  description: >-
    Pulls Traefik Proxy's Prometheus metrics endpoint and exposes the
    request-rate, latency, and error series alongside Naftiko's own
    OpenTelemetry stream so a single dashboard shows ingress + capability
    behavior together. Native bridge between the proxy layer and the
    capability layer for SREs.
  tags:
    - Naftiko
    - Traefik
    - Partnership
    - Observability
    - Prometheus
    - Metrics
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: traefik-env
    description: Traefik Proxy metrics endpoint base URL.
    keys:
      TRAEFIK_METRICS_BASE: TRAEFIK_METRICS_BASE

capability:
  consumes:
    - namespace: traefik
      type: http
      baseUri: '{{TRAEFIK_METRICS_BASE}}'
      resources:
        - name: prometheus-metrics
          path: '/metrics'
          operations:
            - name: scrape-metrics
              method: GET
        - name: health
          path: '/ping'
          operations:
            - name: get-health
              method: GET
        - name: prometheus-query
          path: '/api/v1/query'
          operations:
            - name: query-instant
              method: GET
              inputParameters:
                - { name: query, in: query, type: string, required: true }
                - { name: time, in: query, type: string, required: false }
        - name: prometheus-query-range
          path: '/api/v1/query_range'
          operations:
            - name: query-range
              method: GET
              inputParameters:
                - { name: query, in: query, type: string, required: true }
                - { name: start, in: query, type: string, required: true }
                - { name: end, in: query, type: string, required: true }
                - { name: step, in: query, type: string, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: traefik-metrics-bridge-rest
      description: REST surface for Traefik Prometheus metrics + health.
      resources:
        - name: scrape-metrics
          path: '/metrics'
          operations:
            - name: scrape-metrics
              method: GET
              call: traefik.scrape-metrics
        - name: get-health
          path: '/health'
          operations:
            - name: get-health
              method: GET
              call: traefik.get-health
        - name: query-instant
          path: '/query'
          operations:
            - name: query-instant
              method: GET
              inputParameters:
                - { name: query, in: query, type: string, required: true }
                - { name: time, in: query, type: string, required: false }
              call: traefik.query-instant
        - name: query-range
          path: '/query_range'
          operations:
            - name: query-range
              method: GET
              inputParameters:
                - { name: query, in: query, type: string, required: true }
                - { name: start, in: query, type: string, required: true }
                - { name: end, in: query, type: string, required: true }
                - { name: step, in: query, type: string, required: true }
              call: traefik.query-range

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: traefik-metrics-bridge-mcp
      description: MCP server for SRE / observability agents to query Traefik metrics.
      tools:
        - name: scrape-metrics
          description: Get the raw Prometheus exposition output from Traefik.
          hints: { readOnly: true }
          call: traefik.scrape-metrics
        - name: get-health
          description: Get Traefik health-check status.
          hints: { readOnly: true }
          call: traefik.get-health
        - name: query-instant
          description: Run an instant Prometheus query against Traefik metrics.
          hints: { readOnly: true }
          inputParameters:
            - { name: query, type: string, required: true, description: PromQL expression. }
            - { name: time, type: string, required: false, description: RFC 3339 evaluation timestamp. }
          call: traefik.query-instant
        - name: query-range
          description: Run a range Prometheus query against Traefik metrics.
          hints: { readOnly: true }
          inputParameters:
            - { name: query, type: string, required: true, description: PromQL expression. }
            - { name: start, type: string, required: true, description: RFC 3339 start. }
            - { name: end, type: string, required: true, description: RFC 3339 end. }
            - { name: step, type: string, required: true, description: Step duration, e.g. "30s". }
          call: traefik.query-range
