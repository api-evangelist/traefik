naftiko: "1.0.0-alpha2"

info:
  title: Traefik Managed Subscription Sync
  description: >-
    Surfaces Traefik Hub ManagedSubscription state into Naftiko Fleet so
    every Naftiko-built API knows which downstream applications are
    currently subscribed to it (under which APIPlan, in which APIBundle).
    Closes the loop between "Naftiko shipped a REST API" and "these
    applications are paying / consuming it through Traefik."
  tags:
    - Naftiko
    - Traefik
    - Partnership
    - Subscriptions
    - API-Plans
    - Hub
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: k8s-env
    description: Kubernetes API server + bearer token (Naftiko engine's service account).
    keys:
      K8S_API_BASE: K8S_API_BASE
      K8S_TOKEN: K8S_TOKEN

capability:
  consumes:
    - namespace: k8s
      type: http
      baseUri: '{{K8S_API_BASE}}'
      authentication:
        type: bearer
        token: '{{K8S_TOKEN}}'
      resources:
        - name: managed-subscriptions
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/managedsubscriptions'
          operations:
            - name: list-managed-subscriptions
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-managed-subscription
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true
        - name: managed-subscription
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/managedsubscriptions/{{name}}'
          operations:
            - name: get-managed-subscription
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
            - name: delete-managed-subscription
              method: DELETE
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
        - name: api-plans
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apiplans'
          operations:
            - name: list-api-plans
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-api-plan
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true
        - name: api-bundles
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apibundles'
          operations:
            - name: list-api-bundles
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: traefik-managed-subscription-sync-rest
      description: REST surface for surfacing Traefik subscription state into Naftiko Fleet.
      resources:
        - name: managed-subscriptions
          path: '/managed-subscriptions/{namespace}'
          operations:
            - name: list-managed-subscriptions
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-managed-subscriptions
            - name: create-managed-subscription
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-managed-subscription
        - name: managed-subscription
          path: '/managed-subscriptions/{namespace}/{name}'
          operations:
            - name: get-managed-subscription
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.get-managed-subscription
            - name: delete-managed-subscription
              method: DELETE
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.delete-managed-subscription
        - name: api-plans
          path: '/api-plans/{namespace}'
          operations:
            - name: list-api-plans
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-api-plans
            - name: create-api-plan
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-api-plan
        - name: api-bundles
          path: '/api-bundles/{namespace}'
          operations:
            - name: list-api-bundles
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-api-bundles

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: traefik-managed-subscription-sync-mcp
      description: MCP server for product / FinOps agents to query Traefik subscription state.
      tools:
        - name: list-managed-subscriptions
          description: List Traefik Hub ManagedSubscription CRDs in a namespace (who is subscribed to what).
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-managed-subscriptions
        - name: create-managed-subscription
          description: Create a new Traefik Hub ManagedSubscription CRD.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.create-managed-subscription
        - name: get-managed-subscription
          description: Get a single Traefik Hub ManagedSubscription CRD.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.get-managed-subscription
        - name: delete-managed-subscription
          description: Revoke a Traefik Hub ManagedSubscription.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.delete-managed-subscription
        - name: list-api-plans
          description: List Traefik Hub APIPlan CRDs (rate-limit + quota tiers).
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-api-plans
        - name: create-api-plan
          description: Create a new Traefik Hub APIPlan CRD.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.create-api-plan
        - name: list-api-bundles
          description: List Traefik Hub APIBundle CRDs (subscribable groups).
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-api-bundles
