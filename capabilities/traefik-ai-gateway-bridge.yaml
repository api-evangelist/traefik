naftiko: "1.0.0-alpha2"

info:
  title: Traefik AI Gateway Bridge
  description: >-
    Routes Naftiko-side LLM calls through Traefik Hub's AI Gateway so
    every Naftiko capability that touches an LLM picks up Traefik's
    semantic caching, PII redaction (Presidio), jailbreak detection
    (NVIDIA Safety NIMs), content filtering, and per-token observability
    automatically. OpenAI-compatible passthrough — Naftiko capabilities
    don't need to know which upstream model serves the call.
  tags:
    - Naftiko
    - Traefik
    - Partnership
    - AI-Gateway
    - LLM
    - Safety
    - Caching
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: traefik-env
    description: Traefik Hub AI Gateway base URL + auth token.
    keys:
      TRAEFIK_AI_BASE: TRAEFIK_AI_BASE
      TRAEFIK_AI_TOKEN: TRAEFIK_AI_TOKEN

capability:
  consumes:
    - namespace: traefik-ai
      type: http
      baseUri: '{{TRAEFIK_AI_BASE}}'
      authentication:
        type: bearer
        token: '{{TRAEFIK_AI_TOKEN}}'
      resources:
        - name: chat-completions
          path: '/v1/chat/completions'
          operations:
            - name: chat-completion
              method: POST
        - name: completions
          path: '/v1/completions'
          operations:
            - name: completion
              method: POST
        - name: embeddings
          path: '/v1/embeddings'
          operations:
            - name: embedding
              method: POST
        - name: models
          path: '/v1/models'
          operations:
            - name: list-models
              method: GET
        - name: model
          path: '/v1/models/{{model}}'
          operations:
            - name: get-model
              method: GET
              inputParameters:
                - name: model
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: traefik-ai-gateway-bridge-rest
      description: OpenAI-compatible REST surface backed by Traefik AI Gateway with safety + caching layered in.
      resources:
        - name: chat-completion
          path: '/v1/chat/completions'
          operations:
            - name: chat-completion
              method: POST
              call: traefik-ai.chat-completion
        - name: completion
          path: '/v1/completions'
          operations:
            - name: completion
              method: POST
              call: traefik-ai.completion
        - name: embedding
          path: '/v1/embeddings'
          operations:
            - name: embedding
              method: POST
              call: traefik-ai.embedding
        - name: list-models
          path: '/v1/models'
          operations:
            - name: list-models
              method: GET
              call: traefik-ai.list-models
        - name: get-model
          path: '/v1/models/{model}'
          operations:
            - name: get-model
              method: GET
              inputParameters:
                - { name: model, in: path, type: string, required: true }
              call: traefik-ai.get-model

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: traefik-ai-gateway-bridge-mcp
      description: MCP server exposing the Traefik AI Gateway as agent-callable LLM tools.
      tools:
        - name: chat-completion
          description: Run an OpenAI-compatible chat completion through Traefik AI Gateway (with semantic cache + PII redaction + safety).
          hints: { destructiveHint: false }
          call: traefik-ai.chat-completion
        - name: completion
          description: Run an OpenAI-compatible text completion through Traefik AI Gateway.
          hints: { destructiveHint: false }
          call: traefik-ai.completion
        - name: embedding
          description: Compute embeddings through Traefik AI Gateway.
          hints: { readOnly: true }
          call: traefik-ai.embedding
        - name: list-models
          description: List the LLM models available through Traefik AI Gateway.
          hints: { readOnly: true }
          call: traefik-ai.list-models
        - name: get-model
          description: Get details on a specific Traefik-AI-Gateway model.
          hints: { readOnly: true }
          inputParameters:
            - { name: model, type: string, required: true, description: Model ID, e.g. "gpt-4o" or "claude-3-5-sonnet". }
          call: traefik-ai.get-model
