naftiko: "1.0.0-alpha2"

info:
  title: Traefik API Management Publish
  description: >-
    Publishes Naftiko-built REST exposes as Traefik Hub API CRDs (API,
    APIVersion, APIBundle) so they automatically land in Traefik's
    developer portal with try-it consoles, plans, and managed
    subscriptions. Closes the loop between "Naftiko shipped a REST API"
    and "developers can subscribe to it through the official portal."
  tags:
    - Naftiko
    - Traefik
    - Partnership
    - API-Management
    - Developer-Portal
    - Hub
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: k8s-env
    description: Kubernetes API server + bearer token (Naftiko engine's service account).
    keys:
      K8S_API_BASE: K8S_API_BASE
      K8S_TOKEN: K8S_TOKEN

capability:
  consumes:
    - namespace: k8s
      type: http
      baseUri: '{{K8S_API_BASE}}'
      authentication:
        type: bearer
        token: '{{K8S_TOKEN}}'
      resources:
        - name: list-apis
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apis'
          operations:
            - name: list-apis
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-api
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true
        - name: api
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apis/{{name}}'
          operations:
            - name: get-api
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
            - name: replace-api
              method: PUT
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
            - name: delete-api
              method: DELETE
              inputParameters:
                - name: namespace
                  in: path
                  required: true
                - name: name
                  in: path
                  required: true
        - name: api-versions
          path: '/apis/hub.traefik.io/v1alpha1/namespaces/{{namespace}}/apiversions'
          operations:
            - name: list-api-versions
              method: GET
              inputParameters:
                - name: namespace
                  in: path
                  required: true
            - name: create-api-version
              method: POST
              inputParameters:
                - name: namespace
                  in: path
                  required: true

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: traefik-api-management-publish-rest
      description: REST surface for publishing Naftiko REST exposes into Traefik Hub API Management.
      resources:
        - name: apis
          path: '/apis/{namespace}'
          operations:
            - name: list-apis
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-apis
            - name: create-api
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-api
        - name: api
          path: '/apis/{namespace}/{name}'
          operations:
            - name: get-api
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.get-api
            - name: replace-api
              method: PUT
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.replace-api
            - name: delete-api
              method: DELETE
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
                - { name: name, in: path, type: string, required: true }
              call: k8s.delete-api
        - name: api-versions
          path: '/apiversions/{namespace}'
          operations:
            - name: list-api-versions
              method: GET
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.list-api-versions
            - name: create-api-version
              method: POST
              inputParameters:
                - { name: namespace, in: path, type: string, required: true }
              call: k8s.create-api-version

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: traefik-api-management-publish-mcp
      description: MCP server for publishing Naftiko-built REST APIs into Traefik Hub.
      tools:
        - name: list-apis
          description: List Traefik Hub API CRDs in a namespace.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-apis
        - name: create-api
          description: Publish a new API CRD into Traefik Hub API Management (typically a Naftiko-built REST expose).
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.create-api
        - name: get-api
          description: Get a single Traefik Hub API CRD.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.get-api
        - name: replace-api
          description: Replace a Traefik Hub API CRD.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.replace-api
        - name: delete-api
          description: Delete a Traefik Hub API CRD.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
            - { name: name, type: string, required: true }
          call: k8s.delete-api
        - name: list-api-versions
          description: List Traefik Hub APIVersion CRDs in a namespace.
          hints: { readOnly: true }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.list-api-versions
        - name: create-api-version
          description: Publish a new APIVersion CRD into Traefik Hub.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: namespace, type: string, required: true }
          call: k8s.create-api-version
