naftiko: 1.0.0-alpha2
info:
  label: Traefik Proxy REST API
  description: Shared per-API consumed definition for the Traefik Proxy REST API. Provides read-only HTTP endpoints
    for inspecting routers, services, middlewares, entry points, raw configuration, version, and the support dump.
  tags:
  - API Gateway
  - Configuration
  - Observability
  - Reverse Proxy
  - Traefik
  created: '2026-05-15'
  modified: '2026-05-15'
binds:
- namespace: env
  keys:
    TRAEFIK_API_URL: TRAEFIK_API_URL
capability:
  consumes:
  - type: http
    namespace: traefik-proxy
    baseUri: '{{env.TRAEFIK_API_URL}}'
    description: Traefik Proxy REST API for runtime configuration inspection.
    resources:
    - name: overview
      path: /api
      description: Version, overview statistics, and raw dynamic configuration.
      operations:
      - {name: get-version,    method: GET, description: Get Traefik version., outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: get-overview,   method: GET, description: Get overview counts for HTTP/TCP/UDP., outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: get-rawdata,    method: GET, description: Get raw dynamic configuration from all providers., outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: get-support-dump, method: GET, description: Get anonymized support dump archive., outputRawFormat: binary, outputParameters: [{name: result, type: object, value: '$.'}]}
    - name: entrypoints
      path: /api/entrypoints
      description: Network entry points.
      operations:
      - {name: list-entry-points, method: GET, description: List configured entry points., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-entry-point,   method: GET, description: Get an entry point by name., inputParameters: [{name: name, in: path, type: string, required: true, description: Entry point name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
    - name: http
      path: /api/http
      description: HTTP routers, services, and middlewares.
      operations:
      - {name: list-http-routers,     method: GET, description: List HTTP routers., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-http-router,       method: GET, description: Get a single HTTP router., inputParameters: [{name: name, in: path, type: string, required: true, description: Router name in form name@provider.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: list-http-services,    method: GET, description: List HTTP services., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-http-service,      method: GET, description: Get a single HTTP service., inputParameters: [{name: name, in: path, type: string, required: true, description: Service name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: list-http-middlewares, method: GET, description: List HTTP middlewares., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-http-middleware,   method: GET, description: Get a single HTTP middleware., inputParameters: [{name: name, in: path, type: string, required: true, description: Middleware name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
    - name: tcp
      path: /api/tcp
      description: TCP routers, services, and middlewares.
      operations:
      - {name: list-tcp-routers,     method: GET, description: List TCP routers., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-tcp-router,       method: GET, description: Get a single TCP router., inputParameters: [{name: name, in: path, type: string, required: true, description: TCP router name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: list-tcp-services,    method: GET, description: List TCP services., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-tcp-service,      method: GET, description: Get a single TCP service., inputParameters: [{name: name, in: path, type: string, required: true, description: TCP service name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: list-tcp-middlewares, method: GET, description: List TCP middlewares., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-tcp-middleware,   method: GET, description: Get a single TCP middleware., inputParameters: [{name: name, in: path, type: string, required: true, description: TCP middleware name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
    - name: udp
      path: /api/udp
      description: UDP routers and services.
      operations:
      - {name: list-udp-routers,  method: GET, description: List UDP routers., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-udp-router,    method: GET, description: Get a single UDP router., inputParameters: [{name: name, in: path, type: string, required: true, description: UDP router name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
      - {name: list-udp-services, method: GET, description: List UDP services., outputRawFormat: json, outputParameters: [{name: result, type: array, value: '$.'}]}
      - {name: get-udp-service,   method: GET, description: Get a single UDP service., inputParameters: [{name: name, in: path, type: string, required: true, description: UDP service name.}], outputRawFormat: json, outputParameters: [{name: result, type: object, value: '$.'}]}
    - name: health
      path: /ping
      description: Liveness endpoint.
      operations:
      - {name: ping, method: GET, description: Liveness probe returning 200 OK when Traefik is alive., outputRawFormat: text, outputParameters: [{name: result, type: string, value: '$.'}]}
