specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Traefik
providerId: traefik
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Gateway
  - Kubernetes
  - Reverse Proxy
  - Rate Limiting
description: Traefik Proxy is software that customers self-host; rate limits are configured by the operator
  using Traefik's RateLimit middleware rather than imposed by a vendor service. There is no provider-side
  rate-limit document for Traefik Proxy itself. For the commercial Traefik Hub control plane, rate-limit
  policies are not published on the public site and are part of the commercial agreement.
sources:
  - https://traefik.io/pricing/
  - https://traefik.io/traefik-hub/
limits:
  - name: Traefik Proxy (self-hosted)
    scope: operator-configured
    metric: varies
    limit: configured by the operator via RateLimit middleware
    notes: Traefik Proxy does not throttle its own management API on behalf of users; tenant-facing limits
      are whatever the operator sets in the routing configuration.
  - name: Traefik Hub control plane
    scope: account
    metric: varies
    limit: not published; included in the commercial agreement
policies:
  - name: Operator-Configured RateLimit Middleware
    description: For self-hosted Traefik Proxy deployments, request throttling is implemented as a middleware
      on routers/services, scoped per-source-IP or globally; clients should consult the deployment owner
      for actual values.
  - name: Contact for Hub Limits
    description: For Traefik Hub commercial tiers, operational and management-API limits are governed
      by the customer's contract; contact Traefik sales/support for specifics.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
